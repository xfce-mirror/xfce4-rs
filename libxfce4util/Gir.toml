[options]
library = "Libxfce4util"
version = "1.0"
min_cfg_version = "4.20"
target_path = "."
girs_directories = [
    "../gir-files.xfce/",
    "../gir-filex.gtk/",
]
work_mode = "normal"
single_version_file = true
generate_safety_asserts = false
deprecate_by_min_version = true
trust_return_value_nullability = true

generate = [
    "Libxfce4util.Kiosk",
]

manual = [
    "GLib.Error",
    "GObject.Object",
    "GObject.Value",
]

[[object]]
name = "Libxfce4util.*"
status = "generate"
manual_traits = "Libxfce4utilExtManual"
    [[object.function]]
    name = "expand_desktop_entry_field_codes"
    ignore = true
    [[object.function]]
    name = "expand_variables"
    ignore = true

[[object]]
name = "Libxfce4util.Consolekit"
status = "generate"
manual_traits = "ConsolekitExtManual"
    [[object.function]]
    name = "can_hibernate"
    manual = true
    doc_trait_name = "ConsolekitExtManual"
    [[object.function]]
    name = "can_hybrid_sleep"
    manual = true
    doc_trait_name = "ConsolekitExtManual"
    [[object.function]]
    name = "can_power_off"
    manual = true
    doc_trait_name = "ConsolekitExtManual"
    [[object.function]]
    name = "can_reboot"
    manual = true
    doc_trait_name = "ConsolekitExtManual"
    [[object.function]]
    name = "can_suspend"
    manual = true
    doc_trait_name = "ConsolekitExtManual"

[[object]]
name = "Libxfce4util.Systemd"
status = "generate"
manual_traits = "SystemdExtManual"
    [[object.function]]
    name = "can_hibernate"
    manual = true
    doc_trait_name = "SystemdExtManual"
    [[object.function]]
    name = "can_hybrid_sleep"
    manual = true
    doc_trait_name = "SystemdExtManual"
    [[object.function]]
    name = "can_power_off"
    manual = true
    doc_trait_name = "SystemdExtManual"
    [[object.function]]
    name = "can_reboot"
    manual = true
    doc_trait_name = "SystemdExtManual"
    [[object.function]]
    name = "can_suspend"
    manual = true
    doc_trait_name = "SystemdExtManual"
